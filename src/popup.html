<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <svg class="mark" width="22" height="22" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M 1.5 24.5 L 1.5 28.1 A 14.5 3.5 0 0 0 30.5 28.1 L 30.5 24.5 Z" fill="#163240"/>
          <ellipse cx="16" cy="24.5" rx="14.5" ry="3.5" fill="#1F4654"/>
          <path d="M 4 14.5 L 4 17.7 A 12 3 0 0 0 28 17.7 L 28 14.5 Z" fill="#426F7D"/>
          <ellipse cx="16" cy="14.5" rx="12" ry="3" fill="#5C9AAE"/>
          <path d="M 6.5 4 L 6.5 6.8 A 9.5 2.5 0 0 0 25.5 6.8 L 25.5 4 Z" fill="#A47535"/>
          <ellipse cx="16" cy="4" rx="9.5" ry="2.5" fill="#E4A24A"/>
        </svg>
        <h1>Tokenly</h1>
        <span class="version mono" id="version"></span>
      </div>
    </header>

    <section class="card">
      <div class="card-head">
        <div class="tool-name">Claude · Remaining</div>
        <button class="ghost" id="open-claude">Open</button>
      </div>

      <div id="windows"></div>
      <div id="empty" class="hint"></div>
      <div id="error" class="error" style="display:none"></div>

      <div class="updated mono" id="updated"></div>
    </section>

    <div class="actions">
      <span class="footnote">Reads claude.ai usage via your existing session</span>
      <button class="ghost" id="refresh">Refresh</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
