<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <svg class="mark" width="22" height="22" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M 2 23.2 L 2 26.8 A 14 3.4 0 0 0 30 26.8 L 30 23.2 Z" fill="#163240"/>
          <ellipse cx="16" cy="23.2" rx="14" ry="3.4" fill="#1F4654"/>
          <path d="M 4.5 13.2 L 4.5 16.4 A 11.5 2.9 0 0 0 27.5 16.4 L 27.5 13.2 Z" fill="#426F7D"/>
          <ellipse cx="16" cy="13.2" rx="11.5" ry="2.9" fill="#5C9AAE"/>
          <path d="M 7 4.4 L 7 7.4 A 9 2.4 0 0 0 25 7.4 L 25 4.4 Z" fill="#A47535"/>
          <ellipse cx="16" cy="4.4" rx="9" ry="2.4" fill="#E4A24A"/>
        </svg>
        <h1>Tokenly</h1>
      </div>
    </header>

    <section class="card" id="claude-card">
      <div class="card-head">
        <div class="tool-name">Claude</div>
        <button class="ghost" id="open-claude" title="Open claude.ai">Open</button>
      </div>
      <div class="status" id="claude-status"></div>
      <div class="meta" id="claude-meta"></div>
      <div class="updated mono" id="claude-updated"></div>
    </section>

    <footer>
      <span class="footnote">Tokenly reads what Claude shows you. No login required.</span>
      <button id="reset" class="ghost">Reset</button>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
