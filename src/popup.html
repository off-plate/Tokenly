<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <svg class="mark" width="24" height="24" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M 4 25 L 4 28.4 A 12 3.2 0 0 0 28 28.4 L 28 25 Z" fill="#163240"/>
          <ellipse cx="16" cy="25" rx="12" ry="3.2" fill="#1F4654"/>
          <path d="M 6 18.5 L 6 21.5 A 10 2.7 0 0 0 26 21.5 L 26 18.5 Z" fill="#426F7D"/>
          <ellipse cx="16" cy="18.5" rx="10" ry="2.7" fill="#5C9AAE"/>
          <path d="M 8 12 L 8 14.6 A 8 2.2 0 0 0 24 14.6 L 24 12 Z" fill="#A47535"/>
          <ellipse cx="16" cy="12" rx="8" ry="2.2" fill="#E4A24A"/>
        </svg>
        <h1>Tokenly</h1>
      </div>
      <p class="tagline">Your AI usage, in one place.</p>
    </header>

    <section id="stats">
      <div class="stat">
        <span class="label">ChatGPT visits</span>
        <span class="value" id="chatgpt-count">0</span>
      </div>
      <div class="stat">
        <span class="label">Claude visits</span>
        <span class="value" id="claude-count">0</span>
      </div>
    </section>

    <footer>
      <button id="reset">Reset</button>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
